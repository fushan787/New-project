<style>
  :root {
    --bg: #f6f8fb;
    --panel: #ffffff;
    --panel-strong: #f9fbff;
    --ink: #172033;
    --muted: #657085;
    --line: #d9e0ea;
    --brand: #176b87;
    --brand-dark: #0f4e62;
    --accent: #d94f30;
    --ok: #17805d;
    --warn: #b7791f;
    --danger: #be3a34;
    --shadow: 0 18px 42px rgba(35, 48, 75, .11);
    --radius: 8px;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background:
      linear-gradient(180deg, rgba(255,255,255,.85), rgba(246,248,251,.72)),
      radial-gradient(circle at top left, rgba(23, 107, 135, .14), transparent 32rem),
      var(--bg);
  }

  button,
  input,
  select {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  textarea {
    min-height: 86px;
    resize: vertical;
  }

  .app-shell {
    min-height: 100vh;
  }

  .loading {
    min-height: 100vh;
    display: grid;
    place-items: center;
    align-content: center;
    gap: 16px;
    color: var(--muted);
  }

  .loading-mark {
    width: 38px;
    height: 38px;
    border: 4px solid #d9e0ea;
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .layout {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    min-height: 100vh;
  }

  .sidebar {
    border-right: 1px solid var(--line);
    background: rgba(255, 255, 255, .78);
    backdrop-filter: blur(16px);
    padding: 24px 18px;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .brand-icon {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: var(--radius);
    background: var(--brand);
    color: #fff;
    font-weight: 800;
  }

  .brand h1 {
    font-size: 18px;
    margin: 0;
    letter-spacing: 0;
  }

  .brand span,
  .user-chip span {
    color: var(--muted);
    font-size: 12px;
  }

  .project-list {
    display: grid;
    gap: 8px;
  }

  .sidebar-action {
    width: 100%;
    margin-bottom: 16px;
  }

  .project-button {
    border: 1px solid transparent;
    background: transparent;
    color: var(--ink);
    text-align: left;
    border-radius: var(--radius);
    padding: 12px;
    width: 100%;
  }

  .project-button:hover,
  .project-button.active {
    background: #edf7fa;
    border-color: #b9dbe4;
  }

  .project-button strong {
    display: block;
    margin-bottom: 4px;
    font-size: 14px;
  }

  .main {
    padding: 26px 30px 40px;
    min-width: 0;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    margin-bottom: 22px;
  }

  .eyebrow {
    color: var(--brand-dark);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
  }

  .title {
    margin: 4px 0 8px;
    font-size: clamp(26px, 3vw, 40px);
    line-height: 1.1;
    letter-spacing: 0;
  }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
  }

  .pill {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 10px;
    background: rgba(255,255,255,.75);
  }

  .user-chip {
    min-width: 210px;
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: var(--radius);
    padding: 12px;
    box-shadow: var(--shadow);
  }

  .user-chip strong {
    display: block;
    word-break: break-word;
    font-size: 13px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .metric {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .metric span {
    color: var(--muted);
    font-size: 12px;
  }

  .metric strong {
    display: block;
    margin-top: 8px;
    font-size: 28px;
    line-height: 1;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin: 22px 0 12px;
  }

  .tabs {
    display: inline-flex;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: var(--radius);
    overflow: hidden;
  }

  .tab {
    border: 0;
    background: transparent;
    padding: 9px 14px;
    color: var(--muted);
  }

  .tab.active {
    color: #fff;
    background: var(--brand);
  }

  .primary-button {
    border: 0;
    border-radius: var(--radius);
    color: #fff;
    background: var(--brand);
    padding: 10px 14px;
    font-weight: 700;
  }

  .primary-button:hover {
    background: var(--brand-dark);
  }

  .ghost-button,
  .icon-button {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: var(--ink);
    padding: 9px 12px;
    font-weight: 700;
  }

  .icon-button {
    padding: 6px 9px;
    font-size: 12px;
  }

  .ghost-button:hover,
  .icon-button:hover {
    border-color: #b9dbe4;
    background: #edf7fa;
  }

  .danger-text {
    color: var(--danger);
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }

  .segmented {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    overflow: hidden;
  }

  .segmented button {
    border: 0;
    border-right: 1px solid var(--line);
    background: transparent;
    padding: 7px 12px;
    color: var(--muted);
    min-width: 42px;
  }

  .segmented button:last-child {
    border-right: 0;
  }

  .segmented button.active {
    background: var(--brand);
    color: #fff;
    font-weight: 800;
  }

  .section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--panel-strong);
  }

  .compact-header {
    justify-content: flex-end;
    background: #fff;
  }

  .section-header h2 {
    margin: 0;
    font-size: 16px;
  }

  .gantt {
    overflow-x: auto;
  }

  .gantt-grid {
    min-width: 980px;
    display: grid;
    grid-template-columns: 210px repeat(var(--days), var(--cell, 28px));
  }

  .gantt-cell,
  .gantt-label {
    min-height: 38px;
    border-right: 1px solid #edf0f5;
    border-bottom: 1px solid #edf0f5;
    position: relative;
  }

  .gantt-label {
    padding: 9px 12px;
    font-weight: 700;
    background: #fff;
    position: sticky;
    left: 0;
    z-index: 2;
  }

  .gantt-phase-label {
    font-weight: 800;
    font-size: 13px;
    color: var(--brand-dark);
    background: #eef6fa;
    border-left: 3px solid var(--brand);
    padding-left: 10px;
  }

  .gantt-task-label {
    font-weight: 500;
    font-size: 12px;
    color: var(--ink);
    padding-left: 22px;
    background: #fff;
  }

  .date-head {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding-top: 8px;
    background: #fbfcfe;
  }

  .date-head.today {
    color: var(--accent);
    font-weight: 800;
  }

  .bar {
    position: absolute;
    left: 3px;
    right: 3px;
    height: 9px;
    border-radius: 999px;
  }

  .bar[draggable="true"] {
    cursor: grab;
  }

  .bar[draggable="true"]:active {
    cursor: grabbing;
  }

  .resize-handle {
    position: absolute;
    top: -3px;
    width: 8px;
    height: 15px;
    border-radius: 4px;
    background: rgba(255, 255, 255, .92);
    border: 1px solid rgba(23, 32, 51, .2);
  }

  .resize-handle.left {
    left: -4px;
    cursor: ew-resize;
  }

  .resize-handle.right {
    right: -4px;
    cursor: ew-resize;
  }

  .bar.planned {
    top: 9px;
    background: #9fb4c7;
  }

  .bar.actual {
    bottom: 9px;
    background: var(--brand);
  }

  .bar.delayed {
    background: var(--danger);
  }

  .phase-board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    padding: 16px;
  }

  .subsection {
    padding: 16px;
    border-bottom: 1px solid var(--line);
  }

  .subsection h3 {
    margin: 0 0 10px;
    font-size: 14px;
  }

  .comment-list {
    display: grid;
    gap: 10px;
    margin-bottom: 16px;
  }

  .comment-list h3 {
    margin: 0 0 4px;
    font-size: 15px;
  }

  .comment-item {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 12px;
    background: #fff;
  }

  .comment-item strong {
    display: block;
    font-size: 13px;
  }

  .comment-item span {
    color: var(--muted);
    font-size: 12px;
  }

  .comment-item p {
    margin: 8px 0 0;
    white-space: pre-wrap;
  }

  .phase-card {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    background: #fff;
  }

  .phase-card h3 {
    margin: 0 0 12px;
    font-size: 15px;
  }

  .muted-text {
    color: var(--muted);
    font-size: 12px;
  }

  .row-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .progress-track {
    height: 8px;
    border-radius: 999px;
    background: #e9eef5;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: var(--progress);
    background: var(--ok);
  }

  .task-table {
    width: 100%;
    border-collapse: collapse;
  }

  .task-table th,
  .task-table td {
    border-bottom: 1px solid var(--line);
    padding: 12px 14px;
    text-align: left;
    font-size: 13px;
  }

  .task-table th {
    color: var(--muted);
    background: var(--panel-strong);
    font-size: 12px;
  }

  .status {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 4px 9px;
    font-weight: 700;
    font-size: 12px;
    background: #edf0f5;
  }

  .status.done { color: var(--ok); background: #e8f6ef; }
  .status.delay { color: var(--danger); background: #fdecea; }
  .status.blocked { color: var(--warn); background: #fff6df; }

  /* メンションハイライト */
  .mention {
    display: inline-block;
    background: #dbeafe;
    color: #1d4ed8;
    border-radius: 4px;
    padding: 1px 5px;
    font-weight: 700;
    font-size: 0.92em;
  }

  /* ガント依存関係SVGオーバーレイ */
  .gantt-dep-svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: visible;
  }

  .empty-state,
  .error-state {
    padding: 42px;
    text-align: center;
    color: var(--muted);
  }

  .error-state strong {
    display: block;
    color: var(--danger);
    margin-bottom: 8px;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 20px;
    background: rgba(23, 32, 51, .36);
    z-index: 20;
  }

  .modal {
    width: min(760px, 100%);
    max-height: min(760px, 92vh);
    overflow: auto;
    border-radius: var(--radius);
    background: var(--panel);
    box-shadow: 0 28px 70px rgba(23, 32, 51, .28);
    border: 1px solid var(--line);
  }

  .modal-header {
    position: sticky;
    top: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--panel-strong);
  }

  .modal-header h2 {
    margin: 0;
    font-size: 18px;
  }

  .modal-body {
    padding: 18px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(180px, 1fr));
    gap: 14px;
    padding: 18px;
  }

  .form-grid label,
  .settings-grid label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .form-grid input,
  .form-grid select,
  .form-grid textarea,
  .settings-grid input,
  .settings-grid select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 11px;
    color: var(--ink);
    background: #fff;
    font-weight: 500;
  }

  .form-grid input:focus,
  .form-grid select:focus,
  .form-grid textarea:focus,
  .settings-grid input:focus,
  .settings-grid select:focus {
    outline: 2px solid rgba(23, 107, 135, .2);
    border-color: var(--brand);
  }

  .form-grid .wide,
  .settings-grid .wide,
  .modal-actions {
    grid-column: 1 / -1;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding-top: 4px;
  }

  .modal-note {
    color: var(--muted);
    margin: 12px 0 0;
  }

  .modal-error {
    color: var(--danger);
    margin: 12px 0 0;
    font-weight: 800;
  }

  @media (max-width: 980px) {
    .layout {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: relative;
      height: auto;
      border-right: 0;
      border-bottom: 1px solid var(--line);
    }

    .summary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .topbar,
    .toolbar {
      flex-direction: column;
      align-items: stretch;
    }

    .tabs,
    .actions {
      width: 100%;
    }

    .tabs {
      overflow-x: auto;
    }

    .actions {
      justify-content: flex-start;
    }

    .form-grid {
      grid-template-columns: 1fr;
    }

    .settings-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
