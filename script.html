<script>
  const state = {
    user: null,
    projects: [],
    activeProject: null,
    deletedProjects: [],
    notificationSettings: {},
    auditLogs: [],
    deletedRecords: null,
    portfolioReport: [],
    serverDate: '',
    view: 'gantt',
    ganttScale: 'day',
    sidebarCollapsed: false
  };

  function boot() {
    fetch('https://holidays-jp.github.io/api/v1/date.json')
      .then(res => res.json())
      .then(holidays => { state.holidays = holidays; })
      .catch(() => { state.holidays = {}; })
      .finally(() => {
        google.script.run
          .withSuccessHandler((data) => {
            Object.assign(state, data);
            render();
          })
          .withFailureHandler(renderError)
          .getAppBootstrap();
      });
  }

  function setupSample() {
    renderLoading('サンプルデータを作成しています');
    google.script.run.withSuccessHandler((data) => {
      Object.assign(state, data);
      render();
    }).withFailureHandler(renderError).setupSampleSpreadsheet();
  }

  function openProject(projectId) {
    renderLoading('プロジェクトを読み込んでいます');
    google.script.run.withSuccessHandler((project) => {
      state.activeProject = project;
      render();
    }).withFailureHandler(renderError).getProject(projectId);
  }

  function setView(view) {
    state.view = view;
    if (view === 'audit') return loadAuditLogs();
    if (view === 'restore') return loadDeletedRecords();
    render();
  }

  function togglePhase(phaseId) {
    state.collapsedPhases = state.collapsedPhases || {};
    state.collapsedPhases[phaseId] = !state.collapsedPhases[phaseId];
    render();
  }

  function toggleDashboard() {
    state.showDashboard = state.showDashboard === false ? true : false;
    render();
  }

  function setGanttScale(scale) {
    state.ganttScale = scale;
    render();
  }

  function toggleSidebar() {
    state.sidebarCollapsed = !state.sidebarCollapsed;
    render();
  }

  function render() {
    if (!state.activeProject) {
      document.getElementById('app').innerHTML = `
        <div class="empty-state">
          <h1>Progress Board</h1>
          <p>表示できるプロジェクトがありません。</p>
          <button class="primary-button" onclick="setupSample()">初期シートを作成</button>
          <button class="ghost-button" onclick="openProjectModal()">プロジェクト作成</button>
        </div>
        <div id="modal-root"></div>
      `;
      return;
    }

    const detail = state.activeProject;
    const summary = detail.summary;
    const project = detail.project;

    document.getElementById('app').innerHTML = `
      <div class="layout ${state.sidebarCollapsed ? 'sidebar-collapsed' : ''}">
        <aside class="sidebar">
          <div class="brand">
            <div class="brand-icon">P</div>
            <div><h1>Progress Board</h1><span>Google Workspace MVP</span></div>
          </div>
          <button class="primary-button sidebar-action" onclick="openProjectModal()">プロジェクト作成</button>
          ${state.deletedProjects && state.deletedProjects.length ? `<button class="ghost-button sidebar-action" onclick="openDeletedProjectModal()">削除済みPJ</button>` : ''}
          <div class="project-list">
            ${state.projects.map((item) => `
              <button class="project-button ${item.project_id === project.project_id ? 'active' : ''}" onclick="openProject('${escapeAttr(item.project_id)}')">
                <strong>${escapeHtml(item.project_name)}</strong>
                <span>${escapeHtml(item.status)} / ${escapeHtml(item.client_name)}</span>
              </button>
            `).join('')}
          </div>
        </aside>
        <main class="main">
          <div class="main-container">
            <header class="topbar">
              <div style="display: flex; align-items: flex-start; gap: 16px;">
                <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="サイドバー切替">
                  ${state.sidebarCollapsed ? '&#x2192;' : '&#x2190;'}
                </button>
                <div>
                  <div class="eyebrow">${escapeHtml(project.client_name)}</div>
                  <div style="display: flex; align-items: center; gap: 12px;">
                    <h1 class="title">${escapeHtml(project.project_name)}</h1>
                    <div class="dropdown" id="project-menu">
                      <button class="icon-button" onclick="toggleDropdown('project-menu')" title="操作">⋮</button>
                      <div class="dropdown-menu">
                        <button class="dropdown-item" onclick="openProjectModal(true)">プロジェクト設定</button>
                        <button class="dropdown-item danger" onclick="deleteProject()">プロジェクト削除</button>
                      </div>
                    </div>
                  </div>
                  <div class="meta">
                    <span class="pill">${escapeHtml(project.status)}</span>
                    <span class="pill">${escapeHtml(project.start_date)} - ${escapeHtml(project.end_date)}</span>
                    <span class="pill">Owner ${escapeHtml(project.owner_email)}</span>
                    <button class="secondary-button" style="padding: 2px 8px; font-size: 11px; margin-left: 4px;" onclick="toggleDashboard()">${state.showDashboard === false ? 'サマリーを表示' : 'サマリーを隠す'}</button>
                  </div>
                </div>
              </div>
              <div class="user-chip"><span>Signed in</span><strong>${escapeHtml(state.user.email)}</strong></div>
            </header>

          ${state.showDashboard === false ? '' : `
          <div class="dashboard-container">
            <div class="dashboard-row">
              <div class="metric">
                <span>全体進捗</span>
                <div class="metric-value">${escapeHtml(summary.progress)}%</div>
              </div>
              <div class="metric">
                <span>タスク状況</span>
                <div class="metric-value">${detail.tasks.length}</div>
                <div class="metric-sub">
                  <span style="color:var(--brand)">完了 ${summary.doneTaskCount}</span>
                  <span style="color:var(--danger)">遅延 ${summary.delayedTaskCount}</span>
                </div>
              </div>
              <div class="metric">
                <span>課題状況</span>
                <div class="metric-value">${detail.issues.length}</div>
                <div class="metric-sub">
                  <span style="color:var(--brand)">完了 ${detail.issues.filter(i => i.status === '完了' || i.status === '解決済み').length}</span>
                  <span style="color:var(--text)">未完了 ${detail.issues.filter(i => i.status !== '完了' && i.status !== '解決済み').length}</span>
                </div>
              </div>
            </div>
            
            <div class="dashboard-row">
              ${detail.phases.map(p => `
                <div class="metric">
                  <span>${escapeHtml(p.phase_name)}</span>
                  <div class="metric-value">${escapeHtml(p.progress_percent || 0)}%</div>
                </div>
              `).join('')}
            </div>
          </div>
          `}

          <div class="toolbar">
            <div class="tabs">
              ${tabButton('gantt', 'ガント')}
              ${tabButton('phases', 'フェーズ')}
              ${tabButton('tasks', 'タスク')}
              ${tabButton('issues', '課題')}
              ${tabButton('members', 'メンバー')}
              ${tabButton('settings', '通知')}
              ${tabButton('report', '横断')}
              ${tabButton('restore', '復元')}
              ${tabButton('audit', '監査')}
            </div>
            <div class="actions">
              <button class="primary-button" onclick="openPhaseModal()">フェーズ追加</button>
              <button class="primary-button" onclick="openTaskModal()">タスク追加</button>
              <button class="primary-button" onclick="openIssueModal()">課題登録</button>
            </div>
          </div>

          ${renderActivePanel(detail)}
        </div>
      </main>
      </div>
      <div id="modal-root"></div>
    `;
  }

  function renderActivePanel(detail) {
    if (state.view === 'phases') return renderPhasePanel(detail);
    if (state.view === 'tasks') return renderTaskPanel(detail);
    if (state.view === 'issues') return renderIssuePanel(detail);
    if (state.view === 'members') return renderMemberPanel(detail);
    if (state.view === 'settings') return renderSettingsPanel(detail);
    if (state.view === 'report') return renderReportPanel();
    if (state.view === 'restore') return renderRestorePanel();
    if (state.view === 'audit') return renderAuditPanel();
    return renderGanttPanel(detail);
  }

  function tabButton(view, label) {
    return `<button class="tab ${state.view === view ? 'active' : ''}" onclick="setView('${view}')">${label}</button>`;
  }



  function renderGanttPanel(detail) {
    return `
      <section class="section">
        <div class="section-header">
          <h2>予定 / 実績ガントチャート</h2>
          <div class="segmented">${scaleButton('day', '日')}${scaleButton('week', '週')}${scaleButton('month', '月')}</div>
        </div>
        ${renderGantt(detail)}
      </section>
    `;
  }

  function scaleButton(scale, label) {
    return `<button class="${state.ganttScale === scale ? 'active' : ''}" onclick="setGanttScale('${scale}')">${label}</button>`;
  }

  function renderGantt(detail) {
    const range = getDateRange(detail.project.start_date, detail.project.end_date, state.ganttScale);
    const rows = [];
    state.collapsedPhases = state.collapsedPhases || {};
    detail.phases.forEach((phase) => {
      const isCollapsed = state.collapsedPhases[phase.phase_id];
      rows.push({ label: phase.phase_name, item: phase, isPhase: true, isCollapsed });
      
      if (!isCollapsed) {
        detail.tasks
          .filter((task) => task.phase_id === phase.phase_id)
          .forEach((task) => rows.push({ label: '  ' + task.task_name, item: task, isPhase: false }));
      }
    });
    const width = state.ganttScale === 'day' ? 28 : state.ganttScale === 'week' ? 54 : 76;

    return `
      <div class="gantt">
        <div style="position:relative;">
          <div class="gantt-grid" style="--days:${range.length}; --cell:${width}px">
            <div class="gantt-label date-head" style="position: sticky; left: 0; z-index: 11;">項目</div>
            ${range.map((slot) => {
              let bgClass = '';
              let dayStr = '';
              if (state.ganttScale === 'day') {
                if (slot.isHoliday || slot.dayOfWeek === 0) bgClass = 'holiday-bg';
                else if (slot.dayOfWeek === 6) bgClass = 'saturday-bg';
                const DAYS_JA = ['日', '月', '火', '水', '木', '金', '土'];
                dayStr = `<div>${DAYS_JA[slot.dayOfWeek]}</div>`;
              }
              return `<div class="gantt-cell date-head ${bgClass} ${slot.start <= state.serverDate && state.serverDate <= slot.end ? 'today' : ''}"><div>${escapeHtml(slot.label)}</div>${dayStr}</div>`;
            }).join('')}
            ${rows.map((row) => renderGanttRow(row, range)).join('')}
          </div>
          ${renderGanttDependencyLines(detail, range, rows, width)}
        </div>
      </div>
    `;
  }

  function renderGanttRow(row, range) {
    const item = row.item;
    const type = row.isPhase ? 'phase' : 'task';
    const id = item.task_id || item.phase_id;
    const isDelayed = item.planned_end && item.planned_end < state.serverDate && Number(item.progress_percent || 0) < 100;
    
    let labelHtml = escapeHtml(row.label);
    let tooltipAttr = '';

    if (row.isPhase) {
      const icon = row.isCollapsed ? '▶ ' : '▼ ';
      labelHtml = `<span style="cursor:pointer; display:inline-block; width:100%;" onclick="togglePhase('${escapeAttr(id)}')">${icon}${escapeHtml(row.label)}</span>`;
    } else {
      tooltipAttr = true;
    }
    const baseClass = 'gantt-label ' + (row.isPhase ? 'gantt-phase-label' : 'gantt-task-label');

    return `
      <div class="${baseClass}${tooltipAttr ? ' has-tooltip' : ''}" style="position: sticky; left: 0; z-index: 10;" ${tooltipAttr ? `data-tooltip="担当: ${escapeAttr(item.assignee_email)}\n予定: ${item.planned_start} ～ ${item.planned_end}"` : ''}>${labelHtml}</div>
      ${range.map((slot) => {
        const planned = item.planned_start <= slot.end && item.planned_end >= slot.start;
        const actualEnd = item.actual_end || state.serverDate;
        const actual = item.actual_start && item.actual_start <= slot.end && actualEnd >= slot.start;
        let bgClass = '';
        if (state.ganttScale === 'day') {
          if (slot.isHoliday || slot.dayOfWeek === 0) bgClass = 'holiday-bg';
          else if (slot.dayOfWeek === 6) bgClass = 'saturday-bg';
        }
        return `<div class="gantt-cell ${bgClass}" ondragover="event.preventDefault()" ondrop="dropSchedule(event, '${type}', '${escapeAttr(id)}', '${slot.start}')">${planned ? `<span class="bar planned ${isDelayed ? 'delayed' : ''}" draggable="true" ondragstart="dragSchedule(event, '${type}', '${escapeAttr(id)}', '${escapeAttr(item.planned_start)}', '${escapeAttr(item.planned_end)}', 'move')"><i class="resize-handle left" draggable="true" ondragstart="dragSchedule(event, '${type}', '${escapeAttr(id)}', '${escapeAttr(item.planned_start)}', '${escapeAttr(item.planned_end)}', 'start')"></i><i class="resize-handle right" draggable="true" ondragstart="dragSchedule(event, '${type}', '${escapeAttr(id)}', '${escapeAttr(item.planned_start)}', '${escapeAttr(item.planned_end)}', 'end')"></i></span>` : ''}${actual ? '<span class="bar actual"></span>' : ''}</div>`;
      }).join('')}
    `;
  }

  function renderPhasePanel(detail) {
    return `
      <section class="section">
        <div class="section-header"><h2>フェーズ管理</h2></div>
        <div class="phase-board">${detail.phases.map((phase) => renderPhaseCard(phase, detail.tasks)).join('')}</div>
      </section>
    `;
  }

  function renderPhaseCard(phase, tasks) {
    const phaseTasks = tasks.filter((task) => task.phase_id === phase.phase_id);
    const delayed = phaseTasks.filter((task) => task.planned_end < state.serverDate && Number(task.progress_percent || 0) < 100).length;
    return `
      <article class="phase-card">
        <h3>${escapeHtml(phase.phase_name)}</h3>
        <div class="progress-track"><div class="progress-fill" style="--progress:${Number(phase.progress_percent || 0)}%"></div></div>
        <p>${escapeHtml(phase.progress_percent || 0)}% / ${escapeHtml(phase.status)}</p>
        <p class="muted-text">${escapeHtml(phase.planned_start)} - ${escapeHtml(phase.planned_end)}</p>
        <div class="row-actions">
          <span class="status ${delayed ? 'delay' : Number(phase.progress_percent) >= 100 ? 'done' : ''}">${delayed ? delayed + '件遅延' : phaseTasks.length + ' tasks'}</span>
          <span>
            <button class="secondary-button" style="padding: 4px 8px; font-size: 12px;" onclick="openPhaseModal('${escapeAttr(phase.phase_id)}')">編集</button>
            <button class="secondary-button danger-text" style="padding: 4px 8px; font-size: 12px;" onclick="deletePhase('${escapeAttr(phase.phase_id)}')">削除</button>
          </span>
        </div>
      </article>
    `;
  }

  function renderTaskPanel(detail) {
    const phases = detail.phases || [];
    const assignees = [...new Set(detail.tasks.map(t => t.assignee_email))];
    const statuses = ['未着手', '進行中', '完了'];

    return `
      <section class="section">
        <div class="section-header"><h2>タスク一覧</h2><span class="pill">${detail.tasks.length} tasks</span></div>
        <div class="section-header compact-header" style="flex-wrap: wrap; gap: 8px; justify-content: space-between;">
          <div class="filters" style="display: flex; gap: 8px; flex: 1; align-items: center;">
            <input type="text" id="task-search-input" placeholder="タスク名で検索..." oninput="applyTaskFilter()" style="padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; width: 200px; background-color: var(--surface);">
            <select id="task-phase-filter" onchange="applyTaskFilter()" style="padding: 4px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; background-color: var(--surface);">
              <option value="">すべてのフェーズ</option>
              ${phases.map(p => `<option value="${escapeAttr(p.phase_name)}">${escapeHtml(p.phase_name)}</option>`).join('')}
            </select>
            <select id="task-status-filter" onchange="applyTaskFilter()" style="padding: 4px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; background-color: var(--surface);">
              <option value="">すべての状態</option>
              ${statuses.map(s => `<option value="${escapeAttr(s)}">${escapeHtml(s)}</option>`).join('')}
            </select>
            <select id="task-assignee-filter" onchange="applyTaskFilter()" style="padding: 4px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; background-color: var(--surface);">
              <option value="">すべての担当者</option>
              ${assignees.map(a => `<option value="${escapeAttr(a)}">${escapeHtml(a)}</option>`).join('')}
            </select>
          </div>
          <div class="actions">
            <button class="secondary-button" onclick="openBulkMoveModal()">選択タスクを移動</button>
          </div>
        </div>
        ${renderTaskTable(detail)}
      </section>
    `;
  }

  function renderTaskTable(detail) {
    const phaseById = Object.fromEntries(detail.phases.map((phase) => [phase.phase_id, phase.phase_name]));
    return `
      <table class="task-table">
        <thead><tr><th></th><th>タスク</th><th>フェーズ</th><th>担当</th><th>予定</th><th>優先度</th><th>進捗</th><th>状態</th><th></th></tr></thead>
        <tbody>
          ${detail.tasks.map((task) => {
            const delayed = task.planned_end < state.serverDate && Number(task.progress_percent || 0) < 100;
            const blocked = Boolean(task.blocked_reason);
            const done = Number(task.progress_percent || 0) >= 100;
            const priority = task.priority || 'Medium';
            const priorityClass = priority === 'High' ? 'priority-high' : priority === 'Low' ? 'priority-low' : 'priority-medium';
            const assigneePart = (task.assignee_email || '').split('@')[0];
            return `
              <tr class="task-row" data-task-name="${escapeAttr(task.task_name)}" data-phase="${escapeAttr(phaseById[task.phase_id] || '')}" data-assignee="${escapeAttr(task.assignee_email)}" data-status="${escapeAttr(task.status)}">
                <td><input type="checkbox" class="task-check" value="${escapeAttr(task.task_id)}"></td>
                <td><a href="javascript:void(0)" onclick="openTaskDetail('${escapeAttr(task.task_id)}')" style="color: inherit; text-decoration: none; border-bottom: 1px dashed var(--brand);"><strong>${escapeHtml(task.task_name)}</strong></a>${blocked ? `<br><span class="status blocked">${escapeHtml(task.blocked_reason)}</span>` : ''}</td>
                <td>${escapeHtml(phaseById[task.phase_id] || '')}</td>
                <td>${escapeHtml(task.assignee_email)}</td>
                <td>${escapeHtml(task.planned_start)} - ${escapeHtml(task.planned_end)}</td>
                <td><span class="priority-badge ${priorityClass}">${escapeHtml(priority)}</span></td>
                <td>
                  <div class="task-progress-wrap" style="display:flex; align-items:center; gap:8px;">
                    <div class="task-progress-bar" style="flex:1; --p:${Number(task.progress_percent || 0)}%; --bar-color:${Number(task.progress_percent || 0) >= 100 ? 'var(--ok)' : Number(task.progress_percent || 0) >= 50 ? 'var(--brand)' : 'var(--neutral)'}">
                    </div>
                    <span style="font-size:12px; font-weight:600; width:36px; text-align:right; color:var(--ink);">${escapeHtml(String(task.progress_percent || 0))}%</span>
                  </div>
                </td>
                <td><span class="status ${delayed ? 'delay' : done ? 'done' : ''}">${escapeHtml(delayed ? '遅延' : task.status)}</span></td>
                <td class="row-actions-cell">
                  <div class="row-actions">
                    <button class="secondary-button" style="padding: 4px 8px; font-size: 11px;" onclick="openTaskDetail('${escapeAttr(task.task_id)}')">詳細</button>
                    <button class="secondary-button" style="padding: 4px 8px; font-size: 11px;" onclick="openTaskModal('${escapeAttr(task.task_id)}')">編集</button>
                    <button class="secondary-button" style="padding: 4px 8px; font-size: 11px;" onclick="openMoveTaskModal('${escapeAttr(task.task_id)}')">移動</button>
                    <button class="secondary-button danger-text" style="padding: 4px 8px; font-size: 11px;" onclick="deleteTask('${escapeAttr(task.task_id)}')">削除</button>
                  </div>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  function openTaskDetail(taskId) {
    const detail = state.activeProject;
    const task = detail.tasks.find((item) => item.task_id === taskId);
    if (!task) return;
    const phase = detail.phases.find(p => p.phase_id === task.phase_id);

    showModal('タスク詳細', `
      <div class="drawer-detail">
        <header class="drawer-header">
          <div class="drawer-eyebrow">${escapeHtml(phase ? phase.phase_name : '-')}</div>
          <h2 class="drawer-title">${escapeHtml(task.task_name)}</h2>
        </header>

        <div class="drawer-section">
          <div class="detail-grid">
            <div class="detail-item">
              <label>状態</label>
              <span class="status ${task.status === '完了' ? 'done' : task.planned_end < state.serverDate && Number(task.progress_percent || 0) < 100 ? 'delay' : ''}">${escapeHtml(task.status)}</span>
            </div>
            <div class="detail-item">
              <label>進捗</label>
              <div class="task-progress-wrap">
                <div class="task-progress-bar" style="--p:${Number(task.progress_percent || 0)}%; --bar-color:var(--brand)"></div>
                <span style="font-size:12px; font-weight:700;">${escapeHtml(String(task.progress_percent || 0))}%</span>
              </div>
            </div>
            <div class="detail-item">
              <label>担当者</label>
              <div class="assignee-box">
                <div class="avatar">${(task.assignee_email || 'U').charAt(0).toUpperCase()}</div>
                <span>${escapeHtml(task.assignee_email)}</span>
              </div>
            </div>
            <div class="detail-item">
              <label>優先度</label>
              <span class="priority-badge ${task.priority === 'High' ? 'priority-high' : task.priority === 'Low' ? 'priority-low' : 'priority-medium'}">${escapeHtml(task.priority || 'Medium')}</span>
            </div>
            <div class="detail-item wide">
              <label>予定期間</label>
              <div style="font-weight:600;">${escapeHtml(task.planned_start)} ～ ${escapeHtml(task.planned_end)}</div>
            </div>
            <div class="detail-item wide">
              <label>実績期間</label>
              <div>${escapeHtml(task.actual_start || '-')} ～ ${escapeHtml(task.actual_end || '-')}</div>
            </div>
          </div>
        </div>
        <div class="drawer-section">
          <label class="section-label">タスク概要</label>
          <div class="summary-content">${escapeHtml(task.summary || '概要はありません。')}</div>
        </div>

        ${task.blocked_reason ? `
        <div class="drawer-section">
          <label class="section-label danger-text">ブロッカー</label>
          <div class="blocked-content">${escapeHtml(task.blocked_reason)}</div>
        </div>
        ` : ''}

        <div class="drawer-actions">
          <button class="secondary-button" style="flex:1" onclick="closeModal()">閉じる</button>
          <button class="primary-button" style="flex:1" onclick="openTaskModal('${escapeAttr(task.task_id)}')">編集</button>
        </div>
      </div>
    `);
  }

  function applyTaskFilter() {
    const textInput = document.getElementById('task-search-input');
    const phaseSelect = document.getElementById('task-phase-filter');
    const statusSelect = document.getElementById('task-status-filter');
    const assigneeSelect = document.getElementById('task-assignee-filter');

    if (!textInput || !phaseSelect || !statusSelect || !assigneeSelect) return;

    const text = textInput.value.toLowerCase();
    const phase = phaseSelect.value;
    const status = statusSelect.value;
    const assignee = assigneeSelect.value;

    const rows = document.querySelectorAll('.task-table tbody tr.task-row');
    rows.forEach(row => {
      const taskName = (row.dataset.taskName || '').toLowerCase();
      const taskPhase = row.dataset.phase || '';
      const taskStatus = row.dataset.status || '';
      const taskAssignee = row.dataset.assignee || '';

      const matchText = text === '' || taskName.includes(text);
      const matchPhase = phase === '' || taskPhase === phase;
      const matchStatus = status === '' || taskStatus === status;
      const matchAssignee = assignee === '' || taskAssignee === assignee;

      if (matchText && matchPhase && matchStatus && matchAssignee) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });
  }

  function submitServer(functionName) {
    const args = Array.prototype.slice.call(arguments, 1);
    const data = args[0];
    let isOptimistic = false;

    if (functionName === 'saveTask' && data && data.task_id) {
      const idx = state.activeProject.tasks.findIndex(t => t.task_id === data.task_id);
      if (idx >= 0) {
        state.activeProject.tasks[idx] = Object.assign({}, state.activeProject.tasks[idx], data);
        isOptimistic = true;
      }
    } else if (functionName === 'saveIssue' && data && data.issue_id) {
      const idx = state.activeProject.issues.findIndex(t => t.issue_id === data.issue_id);
      if (idx >= 0) {
        state.activeProject.issues[idx] = Object.assign({}, state.activeProject.issues[idx], data);
        isOptimistic = true;
      }
    } else if (functionName === 'savePhase' && data && data.phase_id) {
      const idx = state.activeProject.phases.findIndex(t => t.phase_id === data.phase_id);
      if (idx >= 0) {
        state.activeProject.phases[idx] = Object.assign({}, state.activeProject.phases[idx], data);
        isOptimistic = true;
      }
    } else if (functionName === 'saveMember' && args[1] && args[1].user_email) {
      const payload = args[1];
      const idx = state.activeProject.members.findIndex(t => t.user_email === payload.user_email);
      if (idx >= 0) {
        state.activeProject.members[idx] = Object.assign({}, state.activeProject.members[idx], payload);
        isOptimistic = true;
      }
    }

    if (isOptimistic) {
      closeModal();
      render();
    } else {
      renderModalBusy();
    }

    const runner = google.script.run.withSuccessHandler((project) => {
      state.activeProject = project;
      if (!isOptimistic) closeModal();
      render();
    }).withFailureHandler((err) => {
      if (!isOptimistic) {
        renderModalError(err);
      } else {
        alert('バックグラウンドでの保存に失敗しました。画面を再読み込みします。\n' + (err.message || err));
        openProject(state.activeProject.project.project_id);
      }
    });

    if (functionName === 'savePhase') runner.savePhase(args[0]);
    if (functionName === 'saveTask') runner.saveTask(args[0]);
    if (functionName === 'saveIssue') runner.saveIssue(args[0]);
    if (functionName === 'saveMember') runner.saveMember(args[0], args[1]);
  }

    if (type === 'task') {
      const idx = state.activeProject.tasks.findIndex(t => t.task_id === id);

        state.activeProject.tasks[idx].planned_start = newStart;

  function daysBetween(start, end) {
    const a = new Date(start + 'T00:00:00');
    const b = new Date(end + 'T00:00:00');
    return Math.round((b - a) / 86400000);
  }

  function addDays(start, days) {
    const date = new Date(start + 'T00:00:00');
    date.setDate(date.getDate() + days);
    return date.toISOString().slice(0, 10);
  }

  function getDateRange(start, end, scale) {
    const slots = [];
    const current = new Date(start + 'T00:00:00');
    const last = new Date(end + 'T00:00:00');

    while (current <= last) {
      const slotStart = new Date(current);
      const slotEnd = new Date(current);
      if (scale === 'week') slotEnd.setDate(slotEnd.getDate() + 6);
      else if (scale === 'month') {
        slotEnd.setMonth(slotEnd.getMonth() + 1);
        slotEnd.setDate(slotEnd.getDate() - 1);
      }
      if (slotEnd > last) slotEnd.setTime(last.getTime());
      const dateStr = toDateString(slotStart);
      const isHoliday = state.holidays && state.holidays[dateStr];
      slots.push({
        start: dateStr,
        end: toDateString(slotEnd),
        label: scale === 'day' ? dateStr.slice(5).replace('-', '/') : dateStr.slice(0, 7),
        isHoliday: isHoliday,
        dayOfWeek: slotStart.getDay()
      });
      current.setTime(slotEnd.getTime());
      current.setDate(current.getDate() + 1);
    }
    return slots;
  }

  function toDateString(date) {
    const y = date.getFullYear();
    const m = ('0' + (date.getMonth() + 1)).slice(-2);
    const d = ('0' + date.getDate()).slice(-2);

  }

  // ガント依存関係 SVG 矢印を計算・描画
  function renderGanttDependencyLines(detail, range, rows, cellWidth) {
    if (!range.length || !rows.length) return '';

    // taskId → rows配列インデックスのマップを構築
    const rowMap = {};
    rows.forEach((row, i) => {
      if (row.item.task_id) rowMap[row.item.task_id] = i;
    });

    // rangeの中で日付が属するスロットのインデックスを検索
    function findSlot(date) {
      for (let i = 0; i < range.length; i++) {
        if (range[i].start <= date && date <= range[i].end) return i;
      }
      return -1;
    }

    const LABEL_W = 210;
    const ROW_H = 38;

    const paths = [];
    detail.tasks.forEach((task) => {
      if (!task.depends_on) return;
      const srcId = task.depends_on;
      const srcRowIdx = rowMap[srcId];
      const dstRowIdx = rowMap[task.task_id];
      if (srcRowIdx === undefined || dstRowIdx === undefined) return;

      const srcTask = detail.tasks.find((t) => t.task_id === srcId);
      if (!srcTask || !srcTask.planned_end || !task.planned_start) return;

      const srcSlot = findSlot(srcTask.planned_end);
      const dstSlot = findSlot(task.planned_start);
      if (srcSlot < 0 || dstSlot < 0) return;

      // 矢印の始点 = ソースタスクの予定バー右端、終点 = ターゲットタスクの予定バー左端
      const x1 = LABEL_W + (srcSlot + 1) * cellWidth;
      const y1 = (srcRowIdx + 1) * ROW_H + ROW_H / 2; // +1 はヘッダー行分
      const x2 = LABEL_W + dstSlot * cellWidth;
      const y2 = (dstRowIdx + 1) * ROW_H + ROW_H / 2;
      const cx = (x1 + x2) / 2;
      paths.push(`<path d="M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}" />`);
    });

    if (!paths.length) return '';

    const svgW = LABEL_W + range.length * cellWidth;
    const svgH = (rows.length + 1) * ROW_H;

    return `
      <svg class="gantt-dep-svg" width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="dep-arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
            <polygon points="0 0, 7 3.5, 0 7" fill="#176b87" opacity="0.7"/>
          </marker>
        </defs>
        <g fill="none" stroke="#176b87" stroke-width="1.5" stroke-opacity="0.65"
           stroke-dasharray="5,3" marker-end="url(#dep-arrow)">
          ${paths.join('')}
        </g>
      </svg>
    `;
  }

    if (!comment) return;
    showModal('コメント編集', `
      <form class="form-grid" onsubmit="submitIssueCommentEdit(event)">
        <input type="hidden" name="comment_id" value="${escapeAttr(comment.comment_id)}">
        <input type="hidden" name="issue_id" value="${escapeAttr(comment.issue_id)}">
        <label class="wide">コメント<textarea name="comment" required maxlength="1000">${escapeHtml(comment.comment)}</textarea></label>
        <div class="modal-actions"><button type="button" class="ghost-button" onclick="closeModal()">閉じる</button><button class="primary-button">保存</button></div>
      </form>
    `);
  }

  function submitIssueCommentEdit(event) {
    event.preventDefault();
    const data = formToObject(event.target);
    const idx = (state.activeProject.issueComments || []).findIndex(t => t.comment_id === data.comment_id);
    if (idx >= 0) state.activeProject.issueComments[idx].comment = data.comment;
    closeModal();
    state.view = 'issues';
    render();

    google.script.run.withSuccessHandler((project) => {
      state.activeProject = project;
      render();
    }).withFailureHandler((err) => {
      alert('コメントの更新に失敗しました。再読み込みします。\n' + (err.message || err));
      openProject(state.activeProject.project.project_id);
    }).updateIssueComment(data);
  }

  function deleteIssueComment(commentId) {
    if (!confirm('このコメントを削除しますか？')) return;
    const idx = (state.activeProject.issueComments || []).findIndex(t => t.comment_id === commentId);
    if (idx >= 0) state.activeProject.issueComments.splice(idx, 1);
    state.view = 'issues';
    render();

    google.script.run.withSuccessHandler((project) => {
      state.activeProject = project;
      render();
    }).withFailureHandler((err) => {
      alert('コメントの削除に失敗しました。再読み込みします。\n' + (err.message || err));
      openProject(state.activeProject.project.project_id);
    }).deleteIssueComment(commentId);
  }

  function archiveDeletedProject(projectId) {
    if (!confirm('この削除済みプロジェクトを完全アーカイブしますか？復元一覧からは消えます。')) return;
    renderLoading('プロジェクトを完全アーカイブしています');
    google.script.run.withSuccessHandler((data) => {
      state.deletedProjects = data.deletedProjects || [];
      closeModal();
      state.view = 'restore';
      render();
    }).withFailureHandler(renderError).archiveDeletedProject(projectId);
  }

  function loadPortfolioReport(showLoading) {
    if (showLoading) renderLoading('横断レポートを集計しています');
    google.script.run.withSuccessHandler((rows) => {
      state.portfolioReport = rows;
      state.view = 'report';
      render();
    }).withFailureHandler(renderError).getPortfolioReport();
  }

  function dragSchedule(event, type, id, start, end, mode) {
    event.stopPropagation();
    event.dataTransfer.setData('text/plain', JSON.stringify({ type, id, start, end, mode: mode || 'move' }));
  }

  function dropSchedule(event, type, id, newStart) {
    event.preventDefault();
    const raw = event.dataTransfer.getData('text/plain');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.type !== type || data.id !== id) return;
    const duration = daysBetween(data.start, data.end);
    let targetStart = newStart;
    let targetEnd = addDays(newStart, duration);
    if (data.mode === 'start') {
      targetEnd = data.end;
    } else if (data.mode === 'end') {
      targetStart = data.start;
      targetEnd = newStart;
    }
    renderLoading('日程を更新しています');
    google.script.run.withSuccessHandler((project) => {
      state.activeProject = project;
      render();
    }).withFailureHandler(renderError).updateSchedule(type, id, targetStart, targetEnd);
  }

  boot();
</script>
